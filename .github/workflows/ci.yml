name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - uses: Swatinem/rust-cache@v2
      - name: Run CI checks
        run: make ci-backend 2>&1 | tee ci-output.txt
      - name: Job summary
        if: always()
        run: |
          echo "## Backend" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          rustc --version >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          if [ -f ci-output.txt ]; then
            echo "### Test Results" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            grep -E '^test result:|^running' ci-output.txt >> "$GITHUB_STEP_SUMMARY" || true
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version-file: tools/vad-lab/frontend/.nvmrc
          cache: npm
          cache-dependency-path: tools/vad-lab/frontend/package-lock.json
      - run: npm ci
        working-directory: tools/vad-lab/frontend
      - run: make ci-frontend
      - name: Job summary
        if: always()
        run: |
          echo "## Frontend" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          node --version >> "$GITHUB_STEP_SUMMARY"
          npm --version >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
