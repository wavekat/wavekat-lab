name: "CV: Dataset Sync"

on:
  workflow_dispatch:
    inputs:
      locale:
        description: "Common Voice locale (e.g. en, ja, zh-TW)"
        required: true
        default: "en"
      split:
        description: "Dataset split (validated, train, dev, test)"
        required: true
        default: "validated"
      version:
        description: "Common Voice version (e.g. cv-corpus-17.0-2024-03-15)"
        required: true
        default: "cv-corpus-17.0-2024-03-15"

jobs:
  sync:
    runs-on: cv-sync
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci
        working-directory: tools/cv-explorer/scripts

      - name: Sync dataset
        run: |
          npx tsx sync.ts \
            --locale "${{ inputs.locale }}" \
            --split "${{ inputs.split }}" \
            --version "${{ inputs.version }}"
        working-directory: tools/cv-explorer/scripts
        env:
          DATACOLLECTIVE_API_KEY: ${{ secrets.DATACOLLECTIVE_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          D1_DATABASE_ID: ${{ secrets.CV_EXPLORER_D1_ID }}
          R2_BUCKET_NAME: ${{ secrets.CV_EXPLORER_R2_BUCKET }}

  cleanup:
    runs-on: ubuntu-latest
    needs: sync
    if: always()
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Delete runner VM
        uses: azure/cli@v2
        with:
          inlineScript: |
            set -euo pipefail

            RG="${{ vars.AZURE_RESOURCE_GROUP }}"

            # Find VMs with the cv-sync prefix
            VMS=$(az vm list --resource-group "$RG" --query "[?starts_with(name, 'cv-sync-')].name" -o tsv)

            for VM in $VMS; do
              echo "Deleting VM: $VM"
              az vm delete \
                --resource-group "$RG" \
                --name "$VM" \
                --yes \
                --force-deletion true
            done

            echo "Cleanup complete."

      - name: Job summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Dataset Sync Complete

          | Setting | Value |
          |---------|-------|
          | **Locale** | \`${{ inputs.locale }}\` |
          | **Split** | \`${{ inputs.split }}\` |
          | **Version** | \`${{ inputs.version }}\` |

          Runner VM has been cleaned up.
          EOF
